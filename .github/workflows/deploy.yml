name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main  # Only deploy when main branch build completes

env:
  REGISTRY: docker.io
  CONTAINER_NAME: fragsoc-website-prod

jobs:
  deploy:
    runs-on: self-hosted
    # Only deploy if the workflow run was successful and from main branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    
    steps:
    - name: Deployment started
      run: |
        echo "🚀 Starting deployment for main branch"
        echo "Workflow run ID: ${{ github.event.workflow_run.id }}"
        echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Stop existing container
      run: |
        if docker ps -q -f name=${{ env.CONTAINER_NAME }}; then
          echo "Stopping existing container..."
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
        else
          echo "No existing container found"
        fi

    - name: Pull latest image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/fragsoc-website:latest

    - name: Deploy new container
      run: |
        docker run -d \
          --name ${{ env.CONTAINER_NAME }} \
          --restart unless-stopped \
          -p 3000:3000 \
          ${{ secrets.DOCKER_USERNAME }}/fragsoc-website:latest

    - name: Verify deployment
      run: |
        sleep 10
        if docker ps -q -f name=${{ env.CONTAINER_NAME }}; then
          echo "✅ Container is running successfully"
          docker logs --tail 20 ${{ env.CONTAINER_NAME }}
          echo "🎉 Deployment completed successfully!"
        else
          echo "❌ Container failed to start"
          docker logs ${{ env.CONTAINER_NAME }}
          exit 1
        fi

    - name: Deployment summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "**Container:** ${{ env.CONTAINER_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** ${{ secrets.DOCKER_USERNAME }}/fragsoc-website:latest" >> $GITHUB_STEP_SUMMARY
        echo "**Deployed at:** $(date)" >> $GITHUB_STEP_SUMMARY

    - name: Clean up old images
      run: |
        echo "🧹 Cleaning up old Docker images..."
        docker image prune -f --filter "until=24h"
        echo "Cleanup completed"
