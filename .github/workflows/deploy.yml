name: Deploy to Production

on:
  push:
    branches:
      - main
      - builder  # Add builder branch
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main
      - builder  # Add builder branch

env:
  REGISTRY: docker.io  # Docker Hub
  CONTAINER_NAME: fragsoc-website-prod

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    
    steps:
    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Stop existing container
      run: |
        if docker ps -q -f name=${{ env.CONTAINER_NAME }}; then
          echo "Stopping existing container..."
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
        else
          echo "No existing container found"
        fi

    - name: Pull latest image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/fragsoc-website:builder

    - name: Deploy new container
      run: |
        docker run -d \
          --name ${{ env.CONTAINER_NAME }} \
          --restart unless-stopped \
          -p 3000:3000 \
          ${{ secrets.DOCKER_USERNAME }}/fragsoc-website:builder

    - name: Verify deployment
      run: |
        sleep 10
        if docker ps -q -f name=${{ env.CONTAINER_NAME }}; then
          echo "✅ Container is running successfully"
          docker logs --tail 20 ${{ env.CONTAINER_NAME }}
        else
          echo "❌ Container failed to start"
          docker logs ${{ env.CONTAINER_NAME }}
          exit 1
        fi

    - name: Clean up old images
      run: |
        echo "Cleaning up old Docker images..."
        docker image prune -f --filter "until=24h"
