name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'  # Build on any branch push
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  NODE_ENV: production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Registry
      uses: docker/login-action@v3
      with:
        # For Docker Hub, don't specify registry or use docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/fragsoc-website
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}
        flavor: |
          latest=false

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-args: |
          NEXT_PUBLIC_FORMSPREE_FORM_ID=${{ secrets.FORMSPREE_FORM_ID }}

    - name: Output build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tags built:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.ref_name }}" = "main" ]; then
          echo "**✅ Latest tag created for production deployment**" >> $GITHUB_STEP_SUMMARY
        else
          echo "**📦 Branch-specific tag created for development**" >> $GITHUB_STEP_SUMMARY
        fi
