version: '3.8'

services:
  fragsoc-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fragsoc-website-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
